<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feature Check · FlagHQ</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f4f6f9;
      --surface: #ffffff;
      --border: #dde1e9;
      --primary: #7c3aed;
      --primary-hover: #6d28d9;
      --text: #111827;
      --muted: #6b7280;
      --radius: 8px;
      --shadow: 0 1px 3px rgba(0,0,0,.1), 0 1px 2px rgba(0,0,0,.06);
      --enabled-bg: #dcfce7;
      --enabled-fg: #16a34a;
      --disabled-bg: #fee2e2;
      --disabled-fg: #dc2626;
      --unknown-bg: #fef3c7;
      --unknown-fg: #b45309;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 40px 16px;
    }

    .logo { font-size: 1.4rem; font-weight: 700; color: var(--primary); letter-spacing: -.5px; margin-bottom: 4px; }
    .tagline { font-size: .85rem; color: var(--muted); margin-bottom: 32px; }

    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); box-shadow: var(--shadow);
      padding: 36px; width: 100%; max-width: 420px;
    }

    h1 { font-size: 1.15rem; font-weight: 600; margin-bottom: 24px; }

    label { display: block; font-size: .85rem; font-weight: 500; color: var(--muted); margin-bottom: 4px; }

    select, input[type="text"] {
      width: 100%; padding: 10px 12px; border: 1px solid var(--border);
      border-radius: var(--radius); font-size: .95rem; outline: none;
      background: var(--surface); transition: border-color .15s; margin-bottom: 16px;
    }
    select:focus, input:focus {
      border-color: var(--primary); box-shadow: 0 0 0 3px rgba(124,58,237,.15);
    }

    .btn {
      width: 100%; padding: 11px; border: none; border-radius: var(--radius);
      background: var(--primary); color: #fff; font-size: .95rem; font-weight: 500;
      cursor: pointer; transition: background .15s; display: flex; align-items: center; justify-content: center;
    }
    .btn:hover { background: var(--primary-hover); }
    .btn:disabled { opacity: .6; cursor: default; }

    .result {
      margin-top: 20px; padding: 16px; border-radius: var(--radius);
      font-size: .95rem; font-weight: 500; text-align: center; display: none;
    }
    .result.enabled  { background: var(--enabled-bg);  color: var(--enabled-fg); }
    .result.disabled { background: var(--disabled-bg); color: var(--disabled-fg); }
    .result.unknown  { background: var(--unknown-bg);  color: var(--unknown-fg); }
    .result.show { display: block; }

    .history { margin-top: 24px; }
    .history h3 { font-size: .8rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 10px; }
    .history-list { list-style: none; display: flex; flex-direction: column; gap: 6px; }
    .history-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 12px; border-radius: 6px; font-size: .82rem;
      border: 1px solid var(--border);
    }
    .history-item .key { font-family: monospace; }
    .history-item .pill {
      font-size: .72rem; font-weight: 600; padding: 2px 8px; border-radius: 20px;
    }
    .pill-on  { background: var(--enabled-bg);  color: var(--enabled-fg);  }
    .pill-off { background: var(--disabled-bg); color: var(--disabled-fg); }

    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.4); border-top-color: #fff;
      border-radius: 50%; animation: spin .6s linear infinite; margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="logo">FlagHQ</div>
<p class="tagline">Feature flag checker</p>

<div class="card">
  <h1>Check a Feature Flag</h1>

  <label for="org-select">Organization</label>
  <select id="org-select"><option value="">Loading…</option></select>

  <label for="flag-key">Feature Key</label>
  <input type="text" id="flag-key" placeholder="e.g. new_checkout" autocomplete="off" />

  <button class="btn" id="check-btn" onclick="checkFlag()">Check Status</button>

  <div class="result" id="result-box"></div>

  <div class="history hidden" id="history-section">
    <h3>Recent Checks</h3>
    <ul class="history-list" id="history-list"></ul>
  </div>
</div>

<script>
  'use strict';

  const API = 'http://localhost:3000/api';
  const MAX_HISTORY = 5;
  const history = [];

  // ── Init ──────────────────────────────────────────────────────────────────
  loadOrgs();

  async function loadOrgs() {
    try {
      const res = await fetch(`${API}/user/orgs`);
      const orgs = await res.json();
      const sel = document.getElementById('org-select');
      if (!orgs.length) {
        sel.innerHTML = '<option value="">No organizations available</option>';
        return;
      }
      sel.innerHTML =
        '<option value="">-- Select organization --</option>' +
        orgs.map((o) => `<option value="${o.id}">${escHtml(o.name)}</option>`).join('');
    } catch (_) {
      document.getElementById('org-select').innerHTML =
        '<option value="">Failed to load organizations</option>';
    }
  }

  // ── Check flag ────────────────────────────────────────────────────────────
  async function checkFlag() {
    const orgId = document.getElementById('org-select').value;
    const key   = document.getElementById('flag-key').value.trim();
    const box   = document.getElementById('result-box');
    const btn   = document.getElementById('check-btn');

    if (!orgId) { showResult('error', '⚠ Please select an organization.'); return; }
    if (!key)   { showResult('error', '⚠ Please enter a feature key.'); return; }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Checking…';
    box.className = 'result';
    box.textContent = '';

    try {
      const res = await fetch(
        `${API}/user/flags/check?org_id=${encodeURIComponent(orgId)}&key=${encodeURIComponent(key)}`
      );
      const data = await res.json();

      if (!res.ok) {
        showResult('unknown', `⚠ ${data.error || 'Error checking flag.'}`);
        return;
      }

      if (data.enabled) {
        showResult('enabled', `✓ "${key}" is ENABLED`);
      } else {
        showResult('disabled', `✗ "${key}" is DISABLED`);
      }

      addHistory(key, data.enabled);
    } catch (_) {
      showResult('unknown', '⚠ Could not connect to the server.');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Check Status';
    }
  }

  function showResult(type, message) {
    const box = document.getElementById('result-box');
    box.className = `result show ${type}`;
    box.textContent = message;
  }

  function addHistory(key, enabled) {
    history.unshift({ key, enabled });
    if (history.length > MAX_HISTORY) history.pop();
    renderHistory();
  }

  function renderHistory() {
    const section = document.getElementById('history-section');
    const list = document.getElementById('history-list');
    section.classList.remove('hidden');
    list.innerHTML = history.map((h) => `
      <li class="history-item">
        <span class="key">${escHtml(h.key)}</span>
        <span class="pill ${h.enabled ? 'pill-on' : 'pill-off'}">
          ${h.enabled ? 'Enabled' : 'Disabled'}
        </span>
      </li>
    `).join('');
  }

  // ── Keyboard shortcut ─────────────────────────────────────────────────────
  document.getElementById('flag-key').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') checkFlag();
  });

  // ── XSS guard ─────────────────────────────────────────────────────────────
  function escHtml(str) {
    return String(str).replace(/[&<>"']/g, (c) =>
      ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
</script>
</body>
</html>
